<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>展厅选车</标题>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20; 背景: #f4f4f4; }
        .car-card { background: 白色; border-radius: 10像素; padding: 15像素; margin-bottom: 15px; box-shadow: 0 2像素 5像素 rgba(0,0,0,0.1); }
        .car-title { font-size: 20像素; font-weight: bold; color: #333; }
  字体大小: ; 颜色: #e74c3c;边距: 10像素
        .汽车库存 { 字体大小: 14像素; color: #27ae60; font-weight: bold; margin-top: 5px; }
        .map-btn { display: block; text-align: center; background: #4285F4;color: 白色; 内边距: 15像素; 圆角: 8像素; 文本装饰: 无; font-weight: 粗体; 上边距: 20px; }
    </style>
</头部>
<主体>

    <h2>欢迎！请从我们的展厅中选择一辆汽车</h2>

    <div class="car-card">
        <div class="car-title">1. AITO M9</div>
        <div class="car-price">价格：85,000 美元</div>
        <p>配置：2026款，5座与6座可选。</p>
    </div>

    <div class="car-card">
        <div class="car-title">2. AITO M7</div>
        <div class="car-price">价格：48,000 - 65,000 美元</div>
        <p>配置：在上述价格区间内提供多种配置。</p>
        <div class="car-stock">⚠️ 剩余仅4辆！</div>
    </div>

    <div class="car-card">
        <div class="car-title">3. SAIC H5</div>
        <div class="car-price">Цена: 32,000 USD</div>
        <p>Конфигурации: Модель 2025 года.</p>
    </div>

    <div class="car-card">
        <div class="car-title">4. AION V</div>
        <div class="car-price">Цена: 25,600 USD</div>
        <p>Конфигурации: Модель 2025 года, полностью электрический автомобиль.</p>
    </div>

    <div class="car-card">
        <div class="car-title">5. AION I60</div>
        <div class="car-price">Цена: 24,500 USD</div>
        <p>Конфигурации: Модель 2025 года, гибрид с увеличенным запасом хода (REV).</p>
    </div>

    <div class="car-card">
        <div class="car-title">6. VOYAH FREE</div>
        <div class="car-price">Цена: Уточняйте</div>
        <p>Конфигурации: Модель 2023 года, гибридный автомобиль.</p>
    </div>

    <div class="car-card">
        <div class="car-title">7. XIAOMI SU7 MAX</div>
        <div class="car-price">Цена: 55,000 USD</div>
        <p>Конфигурации: Модель 2025 года, топовая комплектация MAX.</p>
    </div>

    <a href="https://maps.app.goo.gl/frhdXjd98Q81E6KE8?g_st=ic" class="map-btn" target="_blank">
        📍 Проложить маршрут до нашего шоурума
    </a>

</body>
</html>
